services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - apps/server/.env
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - mongo
    volumes:
      - uploads_data:/var/lib/nexora/uploads

  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  uploads_data:
